  <style>
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #2C6E49;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #loading-logo {
      width: 240px;
      animation: logoBreath 2s ease-in-out infinite;
    }
    #loading-text {
      margin-top: 18px;
      color: #FEEEC3;
      font-size: 22px;
      font-weight: 700;
      font-family: Inter, Arial, sans-serif;
      letter-spacing: 0.02em;
    }
    #loading-spinner {
      margin-top: 24px;
      width: 36px;
      height: 36px;
      border: 4px solid #4C956C;
      border-top: 4px solid #FEEEC3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes logoBreath {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.93); }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

  </head>

  <body>
    <div id="loading-screen">
      <img id="loading-logo" src="/portifolio/static/marketing/completo-branco.svg" alt="Portfolio Marketing Hub" />
      <div id="loading-text">Portfolio Marketing Hub</div>
      <div id="loading-spinner"></div>
    </div>
